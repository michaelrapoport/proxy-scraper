<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <title>SOCKS5 Proxy Scraper</title>
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
  </head>
  <body>
    <div class="container">
      <h1 class="mt-5">SOCKS5 Proxy List</h1>
      <p>Here are the working SOCKS5 proxies found:</p>
      <table class="table table-striped mt-3">
        <thead>
          <tr>
            <th scope="col">#</th>
            <th scope="col">Proxy (IP:Port)</th>
          </tr>
        </thead>
        <tbody>
          {% for proxy in proxies %}
          <tr>
            <th scope="row">{{ loop.index }}</th>
            <td>{{ proxy }}</td>
          </tr>
          {% endfor %}
        </tbody>
      </table>
    </div>
  </body>
</html>
